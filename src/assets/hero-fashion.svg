<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none">
  <!-- Background -->
  <rect width="600" height="700" fill="#F9F5EF"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ebe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e3db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A07A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8926a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="700" fill="url(#bgGrad)"/>
  
  <!-- Fashion Model Silhouette -->
  <g transform="translate(150, 50)">
    <!-- Head -->
    <ellipse cx="150" cy="60" rx="45" ry="55" fill="#2d2d2d"/>
    
    <!-- Hair -->
    <path d="M105 40 Q100 20 120 15 Q150 5 180 15 Q200 20 195 40 Q190 60 180 70 L175 55 Q170 45 150 45 Q130 45 125 55 L120 70 Q110 60 105 40Z" fill="#1a1a1a"/>
    
    <!-- Neck -->
    <rect x="135" y="110" width="30" height="40" fill="#d4a574"/>
    
    <!-- Shoulders and Upper Body -->
    <path d="M80 150 Q100 140 150 140 Q200 140 220 150 L230 200 Q200 190 150 190 Q100 190 70 200 L80 150Z" fill="#d4a574"/>
    
    <!-- Dress -->
    <path d="M70 200 Q50 350 30 550 L100 600 L150 620 L200 600 L270 550 Q250 350 230 200 Q190 210 150 210 Q110 210 70 200Z" fill="url(#dressGrad)"/>
    
    <!-- Dress Details -->
    <path d="M100 250 Q150 260 200 250" stroke="#a8865f" stroke-width="2" fill="none"/>
    <path d="M90 320 Q150 340 210 320" stroke="#a8865f" stroke-width="2" fill="none"/>
    
    <!-- Arms -->
    <path d="M80 160 Q40 200 30 280 Q25 300 35 310 L50 300 Q55 250 80 200" fill="#d4a574"/>
    <path d="M220 160 Q260 200 270 280 Q275 300 265 310 L250 300 Q245 250 220 200" fill="#d4a574"/>
    
    <!-- Belt -->
    <rect x="70" y="280" width="160" height="15" fill="#2E2E2E"/>
    <circle cx="150" cy="287" r="8" fill="#C8A07A"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="100" r="30" fill="#C8A07A" opacity="0.3"/>
  <circle cx="550" cy="200" r="40" fill="#2E2E2E" opacity="0.2"/>
  <circle cx="520" cy="600" r="25" fill="#C8A07A" opacity="0.2"/>
  
  <!-- Text -->
  <text x="300" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999">Fashion Forward</text>
</svg>